<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abigail Lazarus-78758</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* Center the page vertically and horizontally */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#f6b28d,#6f7bf7);
}

/* Main container */
.container{
    text-align:center;
}

/* Counter display */
#counter{
    display:block;
    font-size:80px;
    margin:20px 0;
    color:#222;
}

/* Buttons container */
.btn-container{
    display:flex;
    justify-content:center;
    gap:20px;
}

/* Button styling */
.btn{
    padding:12px 20px;
    font-size:16px;
    border-radius:6px;
    border:2px solid #333;
    background:white;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    background:#eee;
}

</style>
</head>

<body>

<div class="container">

<h1>Counter</h1>

<!-- Counter value -->
<span id="counter">0</span>

<!-- Buttons -->
<div class="btn-container">

<button class="btn" id="decrease">
<i class="fa-solid fa-circle-minus"></i> Decrease
</button>

<button class="btn" id="reset">
<i class="fa-solid fa-rotate-left"></i> Reset
</button>

<button class="btn" id="increase">
<i class="fa-solid fa-circle-plus"></i> Increase
</button>

</div>

</div>

<script>

// Select the counter element
const counter = document.getElementById("counter");

// Select the container holding the buttons
const btnContainer = document.querySelector(".btn-container");

// Variable to track the counter value
let count = 0;


// Add click event listener to the container
btnContainer.addEventListener("click", (e) => {

    // Check if a button was clicked
    if (e.target.classList.contains("btn")) {

        // Determine which button was clicked
        if (e.target.id === "increase") {
            count++;

        } else if (e.target.id === "decrease") {
            count--;

        } else if (e.target.id === "reset") {
            count = 0;
        }

        // Update the counter display
        counter.innerText = count;

        // Change colour based on value
        if (count > 0) {
            counter.style.color = "green";

        } else if (count < 0) {
            counter.style.color = "red";

        } else {
            counter.style.color = "#222";
        }
    }

});

</script>

</body>
</html>
